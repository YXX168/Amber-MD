name: amber_md
description: Amber MD - A beautiful glassmorphism Markdown viewer.
publish_to: 'none'
version: 6.0.0+600

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.7.4+1
  file_picker: ^8.0.0+1
  google_fonts: ^5.0.0
  path_provider: ^2.1.4
  shared_preferences: ^2.2.0
  path: ^1.9.0
  receive_intent: ^0.2.7
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.svg
